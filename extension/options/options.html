<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capsule Extension Settings</title>
  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 40px;
      display: flex;
      justify-content: center;
      margin: 0;
    }
    
    .settings-container {
      width: 480px;
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 16px;
    }
    
    .logo-icon {
      width: 24px;
      height: 24px;
      color: #58a6ff;
    }
    
    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #f0f6fc;
    }
    
    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    label {
      font-size: 13px;
      font-weight: 600;
      color: #f0f6fc;
    }
    
    input[type="text"], input[type="password"] {
      background-color: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      color: #c9d1d9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }
    
    .help-text {
      font-size: 11px;
      color: #8b949e;
    }
    
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }
    
    .btn {
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background-color: #238636;
      color: #ffffff;
    }
    
    .btn-primary:hover {
      background-color: #2ea043;
    }
    
    .btn-secondary {
      background-color: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
    }
    
    .btn-secondary:hover {
      background-color: #30363d;
      color: #f0f6fc;
    }
    
    .status-message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    
    .status-success {
      background-color: rgba(63, 185, 80, 0.1);
      border: 1px solid #2ea043;
      color: #56d364;
    }
    
    .status-error {
      background-color: rgba(248, 81, 73, 0.1);
      border: 1px solid #f85149;
      color: #ff7b72;
    }
  </style>
</head>
<body>
  <div class="settings-container">
    <div class="logo-row">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M12 8v8"/>
        <path d="M8 12h8"/>
      </svg>
      <span class="logo-text">Capsule Configuration</span>
    </div>
    
    <div class="form-group">
      <label for="input-api-url">Backend Server URL</label>
      <input type="text" id="input-api-url" placeholder="http://localhost:8000">
      <span class="help-text">The base URL of the running Capsule FastAPI backend.</span>
    </div>
    
    <div class="form-group">
      <label for="input-api-key">X-API-Key</label>
      <input type="password" id="input-api-key" placeholder="Enter API Key">
      <span class="help-text">API Key generated on the backend to authenticate the extension requests.</span>
    </div>
    
    <div class="btn-row">
      <button id="btn-save" class="btn btn-primary">Save Settings</button>
      <button id="btn-test" class="btn btn-secondary">Test Connection</button>
    </div>
    
    <div id="status-box" class="status-message"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
