version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: capsule-postgres
    environment:
      POSTGRES_DB: capsule
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  redis:
    image: redis:alpine
    container_name: capsule-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  capsule-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capsule-api-server
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./brd:/app/brd
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/capsule
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capsule-celery-worker
    command: celery -A backend.worker.celery_app worker --loglevel=info
    volumes:
      - ./data:/app/data
      - ./brd:/app/brd
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/capsule
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: capsule-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - capsule-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  pgdata:
